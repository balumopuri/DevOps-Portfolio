apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd-elasticsearch
  namespace: kube-system
  labels:
    k8s-app: fluentd-logging
spec:
  selector:
    matchLabels:
      name: fluentd-elasticsearch
  template:
    metadata:
      labels:
        name: fluentd-elasticsearch
    spec:
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule

      containers:
      - name: fluentd-elasticsearch
        image: quay.io/fluent/fluentd-kubernetes-daemonset:v1.19.0-debian-elasticsearch8-1.1
        imagePullPolicy: IfNotPresent

        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            memory: 200Mi

        volumeMounts:
        - name: varlog
          mountPath: /var/log
          readOnly: true

      terminationGracePeriodSeconds: 30

      volumes:
      - name: varlog
        hostPath:
          path: /var/log