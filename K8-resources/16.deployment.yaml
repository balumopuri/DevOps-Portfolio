apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
    tier: frontend
    purpose: deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx
      tier: frontend
      purpose: deployment

  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
        purpose: deployment

    spec:
      containers:
      - name: nginx
        image: balumopuri19/deploment:1.0.0
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  type: LoadBalancer

  selector:
    app: nginx
    tier: frontend
    purpose: deployment

  ports:
  - protocol: TCP
    port: 80
    targetPort: 80