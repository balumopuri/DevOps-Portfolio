apiVersion: v1
kind: Service
metadata:
  name: nginx-lb
spec:
  type: LoadBalancer
  selector:
    project: expense-app
    component: backend
    version: "1.0.0"
    environment: dev
    demo: lb
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30007

---
apiVersion: v1
kind: Pod
metadata:
  name: backend-lb
  labels:
    project: expense-app
    component: backend
    environment: dev
    version: "1.0.0"
spec:
  containers:
  - name: nginx
    image: nginx
  - name: almalinux
    image: almalinux:9