apiVersion: v1
kind: Service
metadata:
  name: nginx-NodePort
spec:
  type: NodePort
  selector:
    project: expense-app
    component: backend
    version: "1.0.0"
    environment: dev
    demo: NP
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: backend-Np
  labels:
    project: expense-app
    component: backend
    environment: dev
    version: "1.0.0"
spec:
  containers:
  - name: nginx
    image: nginx
  - name: almalinux
    image: almalinux:9