# version: "3.9"

networks:
  expense: {}

volumes:
  mysql: {}

services:
  backend:
    image: backend:1.0.0
    command: sh -c "sleep 5 && node /opt/backend/index.js"
    environment:
      - DB_HOST=mysql
    networks:
      - expense
    container_name: backend
    depends_on:
      - mysql

  mysql:
    image: mysql:1.0.0
    networks:
      - expense
    container_name: mysql
    volumes:
      - mysql:/var/lib/mysql

  frontend:
    image: frontend:1.0.0
    networks:
      - expense
    container_name: frontend
    ports:
      - "80:8080"
    depends_on:
      - backend