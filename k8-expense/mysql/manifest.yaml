apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: expense-uat
  labels:
    app: mysql
    tier: mysql
    purpose: expense-uat

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql
      tier: mysql
      purpose: expense-uat

  template:
    metadata:
      labels:
        app: mysql
        tier: mysql
        purpose: expense-uat

    spec:
      containers:
      - name: mysql
        image: balumopuri19/mysql:1.0.0
---

apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
    tier: mysql
    purpose: expense-uat
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306